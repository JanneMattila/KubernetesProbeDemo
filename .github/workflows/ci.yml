name: ci

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "src/**"
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/KubernetesProbeDemo/KubernetesProbeDemo.csproj

      - name: Build
        run: dotnet build src/KubernetesProbeDemo/KubernetesProbeDemo.csproj --no-restore --configuration Release

      - name: Publish
        run: dotnet publish src/KubernetesProbeDemo/KubernetesProbeDemo.csproj --no-restore --configuration Release --output output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kubernetesprobedemo
          path: |
            output/
